<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeGrandGeoQuiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
/* Twemoji emoji images */
img.emoji {
  height: 1em;
  width: 1em;
  margin: 0 0.05em 0 0.1em;
  vertical-align: -0.1em;
  display: inline-block;
}
/* Larger emoji for country flag display */
.country-flag img.emoji {
  height: 1em;
  width: 1em;
  vertical-align: middle;
}
/* Reveal overlay flag */
.reveal-flag img.emoji {
  height: 1em;
  width: 1em;
  vertical-align: middle;
}

:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --border: #2a2f42;
  --accent: #4fffb0;
  --accent2: #ff4f7b;
  --accent3: #4fc3ff;
  --text: #e8ecf5;
  --muted: #606880;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(79,255,176,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(79,255,176,0.03) 1px,transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; width: 100%; max-width: 640px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* lang switcher */
#lang-switcher { position:fixed; top:16px; right:16px; z-index:200; display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:99px; padding:4px; }
.lang-btn { padding:5px 12px; border-radius:99px; border:none; background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.75em; font-weight:500; cursor:pointer; transition:all 0.15s; }
.lang-btn:hover { color:var(--text); }
.lang-btn.active { background:var(--accent); color:#000; font-weight:700; }

/* typography */
.logo { font-size:0.75em; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--accent); font-family:'DM Mono',monospace; margin-bottom:8px; }
h1 { font-size:2.8em; font-weight:800; line-height:1; margin-bottom:6px; }
.subtitle { color:var(--muted); font-size:0.9em; line-height:1.5; margin-bottom:28px; }
.highlight { color:var(--accent); }
.highlight2 { color:var(--accent2); }

/* loader */
#loader { display:flex; align-items:center; gap:10px; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.85em; }
.dot-spin { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }

/* buttons */
.btn-primary { display:inline-block; padding:14px 36px; background:var(--accent); color:#000; font-family:'Syne',sans-serif; font-weight:700; font-size:1em; border:none; border-radius:8px; cursor:pointer; letter-spacing:0.05em; transition:all 0.15s; margin-top:8px; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(79,255,176,0.3); }
.btn-secondary { display:inline-block; padding:12px 28px; background:transparent; color:var(--text); font-family:'Syne',sans-serif; font-weight:700; font-size:0.95em; border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.15s; margin-top:8px; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

/* rules */
.rules { list-style:none; margin:16px 0 24px; display:flex; flex-direction:column; gap:8px; }
.rules li { display:flex; align-items:flex-start; gap:10px; font-size:0.9em; color:var(--muted); line-height:1.4; }
.rules li .ico { color:var(--accent); font-size:1em; margin-top:1px; flex-shrink:0; }

/* timer */
.timer-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.timer-label { font-family:'DM Mono',monospace; font-size:0.8em; color:var(--muted); white-space:nowrap; }
.timer-num { font-family:'DM Mono',monospace; font-size:1.3em; font-weight:500; color:var(--accent); min-width:28px; transition:color 0.3s; }
.timer-num.urgent { color:var(--accent2); }
.progress-track { flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width 1s linear, background 0.3s; }
.progress-fill.urgent { background:var(--accent2); }

/* country block */
.country-block { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin:16px 0; display:flex; align-items:center; gap:16px; }
.country-flag { font-size:2.8em; line-height:1; }
.country-info { flex:1; }
.country-name { font-size:1.6em; font-weight:800; line-height:1.1; }
.turn-label { font-family:'DM Mono',monospace; font-size:0.75em; color:var(--muted); margin-top:2px; }

/* score */
.score-strip { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.score-val { font-size:1.4em; font-weight:800; }
.score-val span { color:var(--accent); }

/* feedback */
.feedback { min-height:24px; font-family:'DM Mono',monospace; font-size:0.85em; font-weight:500; margin-bottom:6px; }
.feedback.ok { color:var(--accent); }
.feedback.warn { color:var(--accent2); }

/* cats grid */
.cats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.cat-btn { padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Syne',sans-serif; font-size:0.82em; font-weight:700; cursor:pointer; text-align:left; transition:all 0.15s; line-height:1.3; display:flex; flex-direction:column; }
.cat-btn:hover:not(:disabled) { border-color:var(--accent3); color:var(--accent3); background:rgba(79,195,255,0.06); transform:translateY(-1px); }
.cat-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
.cat-btn-top { display:flex; align-items:flex-start; justify-content:space-between; gap:4px; width:100%; }
.cat-icon { font-size:1.2em; display:block; margin-bottom:4px; }
.cat-label-text { flex:1; }

/* info btn */
.cat-info-btn { display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:rgba(79,195,255,0.12); border:1px solid rgba(79,195,255,0.3); color:var(--accent3); font-family:'DM Mono',monospace; font-size:0.65em; font-weight:700; cursor:pointer; flex-shrink:0; line-height:1; transition:all 0.15s; user-select:none; }
.cat-info-btn:hover { background:rgba(79,195,255,0.28); border-color:var(--accent3); transform:scale(1.15); }

/* tooltip */
#cat-tooltip { position:fixed; z-index:300; max-width:280px; background:var(--surface); border:1px solid var(--accent3); border-radius:10px; padding:12px 14px; box-shadow:0 8px 32px rgba(0,0,0,0.5); pointer-events:none; opacity:0; transform:translateY(4px) scale(0.97); transition:opacity 0.15s ease,transform 0.15s ease; }
#cat-tooltip.visible { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.tt-title { font-size:0.8em; font-weight:700; color:var(--accent3); margin-bottom:6px; }
.tt-body  { font-size:0.78em; color:var(--muted); line-height:1.5; font-family:'DM Mono',monospace; }

/* cat badge */
.cat-badge { display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:0.7em; background:rgba(79,255,176,0.08); border:1px solid rgba(79,255,176,0.2); border-radius:99px; padding:3px 10px 3px 6px; margin-top:6px; color:var(--accent); }
.badge-flag { font-size:1.2em; }

/* end */
.end-score { font-size:5em; font-weight:800; color:var(--accent); line-height:1; margin:16px 0; }
.end-tagline { color:var(--muted); font-family:'DM Mono',monospace; font-size:0.85em; margin-bottom:28px; }

/* seed box */
.seed-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 16px; font-family:'DM Mono',monospace; font-size:0.7em; color:var(--muted); word-break:break-all; margin-bottom:12px; text-align:left; }
.seed-box strong { color:var(--accent3); display:block; margin-bottom:8px; font-size:1.05em; }
#seed-value { display:block; color:var(--text); font-size:1.1em; user-select:all; cursor:text; padding:8px; background:rgba(255,255,255,0.04); border-radius:4px; border:1px solid var(--border); }

/* reveal overlay */
#reveal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.25s ease; }
.reveal-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 48px; text-align:center; max-width:420px; width:90%; }
.reveal-cat-label { font-family:'DM Mono',monospace; font-size:0.75em; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.reveal-cat-name  { font-size:1.1em; font-weight:700; color:var(--accent3); margin-bottom:20px; }
.reveal-country   { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:28px; }
.reveal-flag      { font-size:2.4em; }
.reveal-country-name { font-size:1.5em; font-weight:800; }
.odometer-wrap { display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:24px; min-height:80px; }
.odo-digit-wrap { width:52px; height:74px; background:#0a0c10; border:1px solid var(--border); border-radius:8px; overflow:hidden; position:relative; box-shadow:inset 0 2px 8px rgba(0,0,0,0.6); }
.odo-digit-wrap::before,.odo-digit-wrap::after { content:''; position:absolute; left:0; right:0; height:1px; background:rgba(79,255,176,0.15); z-index:3; }
.odo-digit-wrap::before { top:36px; }
.odo-digit-wrap::after  { top:37px; }
.odo-digit-inner { position:absolute; width:100%; display:flex; flex-direction:column; align-items:center; }
.odo-digit { width:100%; height:74px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:2.2em; font-weight:500; color:var(--accent); flex-shrink:0; user-select:none; }
.odo-fade-top,.odo-fade-bot { position:absolute; left:0; right:0; height:24px; z-index:2; pointer-events:none; }
.odo-fade-top { top:0;    background:linear-gradient(to bottom,#0a0c10,transparent); }
.odo-fade-bot { bottom:0; background:linear-gradient(to top,  #0a0c10,transparent); }
.odo-digit-wrap.done { border-color:var(--accent); box-shadow:0 0 12px rgba(79,255,176,0.25); }
.reveal-points-label { font-family:'DM Mono',monospace; font-size:0.8em; color:var(--muted); margin-bottom:20px; letter-spacing:0.1em; }
.reveal-skip { font-family:'DM Mono',monospace; font-size:0.75em; color:var(--muted); background:none; border:1px solid var(--border); border-radius:6px; padding:8px 20px; cursor:pointer; transition:all 0.15s; }
.reveal-skip:hover { color:var(--text); border-color:var(--muted); }

.hidden { display:none !important; }

/* Country info button */
.country-info-wrap { display:flex; align-items:center; gap:8px; }
.country-info-btn {
  display:inline-flex; align-items:center; justify-content:center;
  width:20px; height:20px; border-radius:50%;
  background:rgba(79,255,176,0.1); border:1px solid rgba(79,255,176,0.3);
  color:var(--accent); font-family:'DM Mono',monospace;
  font-size:0.65em; font-weight:700; cursor:pointer;
  flex-shrink:0; line-height:1; transition:all 0.15s; user-select:none;
}
.country-info-btn:hover { background:rgba(79,255,176,0.25); border-color:var(--accent); transform:scale(1.15); }

/* Country tooltip (separate from cat tooltip) */
#country-tooltip {
  position:fixed; z-index:300; max-width:260px;
  background:var(--surface); border:1px solid var(--accent);
  border-radius:10px; padding:10px 14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  pointer-events:none;
  opacity:0; transform:translateY(4px) scale(0.97);
  transition:opacity 0.15s ease,transform 0.15s ease;
  font-family:'DM Mono',monospace; font-size:0.8em; color:var(--muted); line-height:1.5;
}
#country-tooltip.visible { opacity:1; transform:translateY(0) scale(1); }

</style>
</head>
<body>

<div id="lang-switcher">
  <button class="lang-btn active" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ua')">UA</button>
</div>

<div id="app">

  <!-- SETUP -->
  <div id="panel-setup" class="panel">
    <div class="logo">◈ LeGrandGeoQuiz</div>
    <h1>Geo<span class="highlight">Quiz</span></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
    <div id="loader"><div class="dot-spin"></div>&nbsp;<span data-i18n="loading"></span></div>
    <div id="setup-ready" class="hidden">
      <ul class="rules">
        <li><span class="ico">&#8594;</span><span data-i18n="rule1"></span></li>
        <li><span class="ico">&#8594;</span><span data-i18n="rule2"></span></li>
        <li><span class="ico">&#8594;</span><span data-i18n="rule3"></span></li>
        <li><span class="ico">&#8594;</span><span data-i18n="rule4"></span></li>
        <li><span class="ico">&#8594;</span><span data-i18n="rule5"></span></li>
      </ul>
      <div style="margin-bottom:16px;">
        <label style="font-family:'DM Mono',monospace;font-size:0.75em;color:var(--muted);display:block;margin-bottom:6px;" data-i18n="seedLabel"></label>
        <div style="display:flex;gap:8px;">
          <input id="seed-input" type="text" data-i18n-placeholder="seedPlaceholder"
            style="flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75em;outline:none;">
          <button class="btn-secondary" style="margin-top:0;padding:10px 16px;font-size:0.85em;" onclick="startWithSeedInput()" data-i18n="seedLoad"></button>
        </div>
      </div>
      <button class="btn-primary" onclick="startGame()" data-i18n="newGame"></button>
    </div>
  </div>

  <!-- GAME -->
  <div id="panel-game" class="panel hidden">
    <div class="score-strip">
      <div class="score-val"><span data-i18n="score"></span>&nbsp;:&nbsp;<span id="total-score">0</span></div>
      <div class="turn-label" id="turn-label"></div>
    </div>
    <div id="game-seed-display" style="font-family:'DM Mono',monospace;font-size:0.65em;color:var(--muted);margin-bottom:10px;word-break:break-all;"></div>
    <div class="timer-row">
      <span class="timer-label" data-i18n="time"></span>
      <span class="timer-num" id="timer-num">20</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="country-block">
      <div class="country-flag" id="country-flag">&#127757;</div>
      <div class="country-info">
        <div class="country-info-wrap">
          <div class="country-name" id="country-name">---</div>
          <button class="country-info-btn" id="country-info-btn" onclick="toggleCountryTooltip(event)">i</button>
        </div>
        <div class="turn-label" id="country-sub"></div>
      </div>
    </div>
    <div class="cats-grid" id="cats-grid"></div>
  </div>

  <!-- END -->
  <div id="panel-end" class="panel hidden">
    <div class="logo" data-i18n="gameOver"></div>
    <h1><span data-i18n="finalScore"></span><br><span class="highlight" data-i18n="final"></span></h1>
    <div class="end-score" id="final-score">0</div>
    <p class="end-tagline" id="end-tagline"></p>
    <div class="seed-box" id="seed-display"></div>
    <button class="btn-secondary" style="margin-top:0;margin-bottom:16px;width:100%;font-size:0.85em;" onclick="copySeed()" data-i18n="copySeed"></button>
    <button class="btn-primary" onclick="location.reload()" data-i18n="playAgain"></button>
  </div>

</div>

<div id="country-tooltip"></div>
<div id="cat-tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-body"  id="tt-body"></div>
</div>

function t(key) {
  var lang = TRANSLATIONS[currentLang];
  if (lang && lang[key] !== undefined) return lang[key];
  return TRANSLATIONS['fr'][key] || key;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === lang.toUpperCase());
  });
  document.documentElement.lang = (lang === 'ua') ? 'uk' : lang;
  applyTranslations();
  if (gameCategories.length > 0 && currentStep < 8) rerenderCategoryButtonNames();
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

var tooltipTimeout = null;

function showTooltip(catId, targetEl) {
  var cat = ALL_CATEGORIES.find(function(c) { return c.id === catId; });
  if (!cat) return;
  document.getElementById('tt-title').textContent = cat.icon + ' ' + catName(cat);
  document.getElementById('tt-body').textContent  = catDesc(cat);
  var tip = document.getElementById('cat-tooltip');
  var tipWidth = 280;
  var rect = targetEl.getBoundingClientRect();
  var left = Math.max(8, Math.min(rect.left + rect.width/2 - tipWidth/2, window.innerWidth - tipWidth - 8));
  tip.style.width = tipWidth + 'px';
  tip.style.left  = left + 'px';
  tip.style.visibility = 'hidden';
  tip.classList.add('visible');
  var tipH = tip.offsetHeight;
  tip.classList.remove('visible');
  tip.style.visibility = '';
  tip.style.top = (rect.top - 8 - tipH < 8) ? (rect.bottom + 8) + 'px' : (rect.top - 8 - tipH) + 'px';
  clearTimeout(tooltipTimeout);
  tip.classList.add('visible');
}

function hideTooltip() {
  clearTimeout(tooltipTimeout);
  tooltipTimeout = setTimeout(function() {
    document.getElementById('cat-tooltip').classList.remove('visible');
  }, 120);
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.cat-info-btn') && !e.target.closest('#cat-tooltip')) {
    document.getElementById('cat-tooltip').classList.remove('visible');
  }
});

// ─── SEED ─────────────────────────────────────────────────────────────────────
function shuffle(arr) { return arr.slice().sort(function() { return Math.random() - 0.5; }); }

function encodeSeed(ci, ki) { return ci.join('-') + '_' + ki.join('-'); }

function decodeSeed(seed) {
  var parts = seed.split('_');
  if (parts.length !== 2) return null;
  var ci = parts[0].split('-').map(Number);
  var ki = parts[1].split('-').map(Number);
  if (ci.length !== 8 || ki.length !== 8) return null;
  if (ci.some(isNaN) || ki.some(isNaN)) return null;
  return {countryIndices:ci, catIndices:ki};
}

function generateSeed() {
  var catPool = shuffle(ALL_CATEGORIES.map(function(_,i){return i;})).slice(0,8);
  var catIds  = catPool.map(function(i){return ALL_CATEGORIES[i].id;});
  var eligible = countriesDB
    .map(function(c,i){return {c:c,i:i};})
    .filter(function(x){ return catIds.every(function(id){ return x.c[id] !== false && x.c[id] !== null && x.c[id] !== undefined; }); });
  var countryPool;
  if (eligible.length >= 8) {
    countryPool = shuffle(eligible).slice(0,8);
  } else {
    var scored = countriesDB.map(function(c,i){
      return {c:c,i:i,score:catIds.filter(function(id){return c[id]!==false&&c[id]!==null&&c[id]!==undefined;}).length};
    }).sort(function(a,b){return b.score-a.score;});
    countryPool = shuffle(scored.slice(0, Math.min(16,scored.length))).slice(0,8);
  }
  return encodeSeed(countryPool.map(function(x){return x.i;}), catPool);
}

function applyGameFromSeed(seed) {
  var decoded = decodeSeed(seed);
  if (!decoded) { alert(t('invalidSeed')); return false; }
  var ci = decoded.countryIndices, ki = decoded.catIndices;
  if (ci.some(function(i){return i<0||i>=countriesDB.length;}))  { alert(t('invalidSeedIdx')); return false; }
  if (ki.some(function(i){return i<0||i>=ALL_CATEGORIES.length;})) { alert(t('invalidSeedIdx')); return false; }
  gameCountries  = ci.map(function(i){return countriesDB[i];});
  gameCategories = ki.map(function(i){return ALL_CATEGORIES[i];});
  currentSeed = seed;
  return true;
}

// ─── GAME START ───────────────────────────────────────────────────────────────
function startGame(seedOverride) {
  var seed = seedOverride || generateSeed();
  if (!applyGameFromSeed(seed)) return;
  currentSeed    = seed;
  currentStep    = 0;
  totalScore     = 0;
  usedCategories = {};
  isRevealing    = false;
  document.getElementById('panel-setup').classList.add('hidden');
  document.getElementById('panel-game').classList.remove('hidden');
  document.getElementById('game-seed-display').textContent = '🔑 ' + currentSeed;
  renderCategoryButtons();
  showTurn();
}

function startWithSeedInput() {
  var raw = document.getElementById('seed-input').value.trim();
  if (!raw) { alert(t('enterSeed')); return; }
  var match = raw.match(/(\d[\d-]*_[\d-]*\d)/);
  startGame(match ? match[1] : raw);
}

// ─── CATEGORY BUTTONS ─────────────────────────────────────────────────────────
function makeCatBtnHTML(cat) {
  return '<div class="cat-btn-top">'
       + '<span class="cat-icon">' + cat.icon + '</span>'
       + '<span class="cat-info-btn" data-catid="' + cat.id + '">i</span>'
       + '</div>'
       + '<span class="cat-label-text">' + catName(cat) + '</span>';
}

function renderCategoryButtons() {
  var grid = document.getElementById('cats-grid');
  grid.innerHTML = '';
  gameCategories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.id = 'cat-' + cat.id;
    btn.innerHTML = makeCatBtnHTML(cat);
    btn.addEventListener('click', function(e) {
      if (e.target.closest('.cat-info-btn')) return;
      handleChoice(cat.id);
    });
    grid.appendChild(btn);
  });
  attachInfoListeners();
}

function rerenderCategoryButtonNames() {
  gameCategories.forEach(function(cat) {
    var btn = document.getElementById('cat-' + cat.id);
    if (!btn || btn.disabled) return;
    var el = btn.querySelector('.cat-label-text');
    if (el) el.textContent = catName(cat);
    var infoBtn = btn.querySelector('.cat-info-btn');
    if (infoBtn) {
      infoBtn.replaceWith(infoBtn.cloneNode(true));
    }
  });
  attachInfoListeners();
}

function attachInfoListeners() {
  document.querySelectorAll('.cat-info-btn').forEach(function(el) {
    var clone = el.cloneNode(true);
    el.parentNode.replaceChild(clone, el);
    clone.addEventListener('mouseenter', function() { showTooltip(clone.dataset.catid, clone); });
    clone.addEventListener('mouseleave', hideTooltip);
    clone.addEventListener('click', function(e) {
      e.stopPropagation();
      var tip = document.getElementById('cat-tooltip');
      if (tip.classList.contains('visible')) hideTooltip();
      else showTooltip(clone.dataset.catid, clone);
    });
  });
}

// ─── TURN DISPLAY ─────────────────────────────────────────────────────────────
function showTurn() {
  if (currentStep >= 8) { endGame(); return; }
  var c    = gameCountries[currentStep];
  var name = getCountryName(c);
  var flag = c.flag || c.emoji || '🌍';

  document.getElementById('country-flag').textContent = flag;
  applyEmoji(document.getElementById('country-flag'));
  document.getElementById('country-name').textContent = name;
  document.getElementById('country-sub').textContent  = c.country_code ? '[' + c.country_code + ']' : '';

  // Country info button: show/hide based on description availability
  var countryInfoBtn = document.getElementById('country-info-btn');
  var desc = getCountryDesc(c);
  if (desc) {
    countryInfoBtn.style.display = 'inline-flex';
    countryInfoBtn.dataset.desc = desc;
    countryInfoBtn.dataset.name = name;
  } else {
    countryInfoBtn.style.display = 'none';
  }
  document.getElementById('turn-label').textContent   = t('turn') + ' ' + (currentStep+1) + ' ' + t('of') + ' 8';
  document.getElementById('total-score').textContent  = totalScore;

  gameCategories.forEach(function(cat) {
    var btn = document.getElementById('cat-' + cat.id);
    if (!btn) return;
    if (usedCategories[cat.id]) {
      btn.disabled = true;
    } else {
      btn.disabled = false;
      btn.innerHTML = makeCatBtnHTML(cat);
      btn.style.borderColor = '';
      btn.style.color = '';
      // re-bind click
      var newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      (function(catId) {
        newBtn.addEventListener('click', function(e) {
          if (e.target.closest('.cat-info-btn')) return;
          handleChoice(catId);
        });
      })(cat.id);
    }
  });

  applyEmoji(document.getElementById('cats-grid'));
  hideCountryTooltip();
  attachInfoListeners();
  clearFeedback();
  startTimer();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIME_PER_TURN;
  updateTimerUI();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timerInterval); autoPick(); }
  }, 1000);
}

function updateTimerUI() {
  var numEl  = document.getElementById('timer-num');
  var fillEl = document.getElementById('progress-fill');
  numEl.textContent   = timeLeft;
  fillEl.style.width  = (timeLeft / TIME_PER_TURN * 100) + '%';
  var urgent = timeLeft <= 8;
  numEl.classList.toggle('urgent',  urgent);
  fillEl.classList.toggle('urgent', urgent);
}

// ─── AUTO PICK ────────────────────────────────────────────────────────────────
function autoPick() {
  if (isRevealing) return;
  isRevealing = true;
  clearInterval(timerInterval);
  disableAllCatButtons();
  var PENALTY = 200;
  totalScore += PENALTY;
  document.getElementById('total-score').textContent = totalScore;

  var country = gameCountries[currentStep];
  var cName   = getCountryName(country);
  var flag    = country.flag || country.emoji || '🌍';

  var overlay = document.createElement('div');
  overlay.id = 'reveal-overlay';
  overlay.innerHTML =
    '<div class="reveal-card" style="border-color:var(--accent2);">'
    + '<div class="reveal-cat-label" style="color:var(--accent2);">' + t('timeUp') + '</div>'
    + '<div class="reveal-cat-name" style="color:var(--accent2);">' + t('noAnswer') + '</div>'
    + '<div class="reveal-country"><span class="reveal-flag">' + flag + '</span>'
    + '<span class="reveal-country-name">' + cName + '</span></div>'
    + '<div style="font-family:\'DM Mono\',monospace;font-size:4em;font-weight:700;color:var(--accent2);margin:16px 0;animation:penaltyPop 0.4s cubic-bezier(0.34,1.56,0.64,1);">+' + PENALTY + '</div>'
    + '<div class="reveal-points-label" style="color:var(--accent2);">' + t('penalty') + '</div>'
    + '<button class="reveal-skip" id="reveal-skip-btn" style="border-color:var(--accent2);color:var(--accent2);">' + t('cont') + '</button>'
    + '</div>';
  var s = document.createElement('style');
  s.textContent = '@keyframes penaltyPop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}';
  overlay.appendChild(s);
  document.body.appendChild(overlay);

  var overlayClosed = false;
  function closeOverlay() {
    if (overlayClosed) return;
    overlayClosed = true;
    overlay.style.transition = 'opacity 0.3s';
    overlay.style.opacity = '0';
    setTimeout(function() { isRevealing = false; overlay.remove(); currentStep++; showTurn(); }, 300);
  }
  applyEmoji(overlay);
  document.getElementById('reveal-skip-btn').onclick = closeOverlay;
  setTimeout(closeOverlay, 2800);
}

// ─── HANDLE CHOICE ────────────────────────────────────────────────────────────
function handleChoice(catId) {
  if (isRevealing) return;
  clearInterval(timerInterval);
  var btn = document.getElementById('cat-' + catId);
  if (!btn || btn.disabled) return;

  var country = gameCountries[currentStep];
  var rawVal  = country[catId];
  var points  = (rawVal === false || rawVal === null || rawVal === undefined) ? false : Number(rawVal);
  var cName   = getCountryName(country);
  var flag    = country.flag || country.emoji || '🌍';
  var catObj  = gameCategories.find(function(c) { return c.id === catId; });

  usedCategories[catId] = true;
  disableAllCatButtons();

  btn.innerHTML =
    '<div class="cat-btn-top"><span class="cat-icon">' + catObj.icon + '</span></div>'
    + '<span class="cat-label-text">' + catName(catObj) + '</span>'
    + '<span class="cat-badge"><span class="badge-flag">' + flag + '</span>' + cName + '</span>';
  btn.style.borderColor = 'var(--accent3)';
  btn.style.color = 'var(--accent3)';
  applyEmoji(btn);

  isRevealing = true;
  showReveal(flag, cName, catObj, points, function() {
    isRevealing = false;
    if (points !== false) totalScore += points;
    document.getElementById('total-score').textContent = totalScore;
    currentStep++;
    showTurn();
  });
}

function disableAllCatButtons() {
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.disabled = true; });
}

// ─── ODOMETER REVEAL ──────────────────────────────────────────────────────────
function showReveal(flag, cName, catObj, finalValue, onDone) {
  var overlay = document.createElement('div');
  overlay.id = 'reveal-overlay';
  var isFalse = finalValue === false;
  var target  = isFalse ? 0 : Math.abs(finalValue);

  overlay.innerHTML =
    '<div class="reveal-card">'
    + '<div class="reveal-cat-label">' + t('catSelected') + '</div>'
    + '<div class="reveal-cat-name">' + catObj.icon + ' ' + catName(catObj) + '</div>'
    + '<div class="reveal-country"><span class="reveal-flag">' + flag + '</span>'
    + '<span class="reveal-country-name">' + cName + '</span></div>'
    + '<div class="odometer-wrap" id="odo-wrap"></div>'
    + '<div class="reveal-points-label">' + (isFalse ? t('noData') : t('ptsAdded')) + '</div>'
    + '<button class="reveal-skip" id="reveal-skip-btn">' + t('skip') + '</button>'
    + '</div>';
  document.body.appendChild(overlay);
  applyEmoji(overlay);

  var digits = target.toString().split('').map(Number);
  if (!digits.length) digits.push(0);
  var wrap = document.getElementById('odo-wrap');
  buildOdometer(wrap, digits.length);

  var animDone = false;
  var skipBtn  = document.getElementById('reveal-skip-btn');

  var revealClosed = false;
  function closeReveal() {
    if (revealClosed) return;
    revealClosed = true;
    overlay.style.transition = 'opacity 0.3s';
    overlay.style.opacity = '0';
    setTimeout(function() { overlay.remove(); onDone(); }, 300);
  }

  function onComplete() {
    animDone = true;
    wrap.querySelectorAll('.odo-digit-wrap').forEach(function(d) { d.classList.add('done'); });
    skipBtn.textContent = t('cont');
    skipBtn.style.borderColor = 'var(--accent)';
    skipBtn.style.color = 'var(--accent)';
    skipBtn.onclick = closeReveal;
    setTimeout(function() { if (document.getElementById('reveal-overlay')) closeReveal(); }, 2500);
  }

  function onSkip() {
    setOdometerToFinal(wrap, digits);
    onComplete();
  }

  skipBtn.onclick = function() { animDone ? closeReveal() : onSkip(); };
  runOdometerAnimation(wrap, digits, target, isFalse, onComplete, onSkip);
}

function buildOdometer(wrap, n) {
  wrap.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var dw = document.createElement('div');
    dw.className = 'odo-digit-wrap';
    var inner = document.createElement('div');
    inner.className = 'odo-digit-inner';
    for (var d = 0; d <= 9; d++) {
      var span = document.createElement('div');
      span.className = 'odo-digit';
      span.textContent = d;
      inner.appendChild(span);
    }
    var ft = document.createElement('div'); ft.className = 'odo-fade-top';
    var fb = document.createElement('div'); fb.className = 'odo-fade-bot';
    dw.appendChild(inner); dw.appendChild(ft); dw.appendChild(fb);
    wrap.appendChild(dw);
    setDigitTo(dw, 0, false);
  }
}

function setDigitTo(dw, value, animated) {
  var inner = dw.querySelector('.odo-digit-inner');
  inner.style.transition = animated ? 'transform 0.12s cubic-bezier(0.4,0,0.2,1)' : 'none';
  inner.style.transform  = 'translateY(' + (-value * 74) + 'px)';
}

function setOdometerToFinal(wrap, digits) {
  var dws = wrap.querySelectorAll('.odo-digit-wrap');
  digits.forEach(function(d, i) { setDigitTo(dws[i], d, false); });
}

function runOdometerAnimation(wrap, finalDigits, finalValue, isFalse, onComplete, onSkip) {
  if (isFalse || finalValue === 0) { setTimeout(onComplete, 600); return; }
  var DURATION = 2400;
  var start    = performance.now();
  var dws      = Array.from(wrap.querySelectorAll('.odo-digit-wrap'));
  var cancelled = false;
  var skipBtn   = document.getElementById('reveal-skip-btn');
  if (skipBtn) skipBtn.onclick = function() { cancelled = true; onSkip(); };

  function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  function renderValue(val) {
    var str = Math.round(val).toString().padStart(finalDigits.length, '0');
    str.split('').forEach(function(ch, i) { if (i < dws.length) setDigitTo(dws[i], Number(ch), true); });
  }

  function tick(now) {
    if (cancelled) return;
    var t = Math.min((now - start) / DURATION, 1);
    renderValue(ease(t) * finalValue);
    if (t < 1) requestAnimationFrame(tick);
    else { renderValue(finalValue); onComplete(); }
  }
  requestAnimationFrame(tick);
}

// ─── FEEDBACK ─────────────────────────────────────────────────────────────────
function clearFeedback() {
  var el = document.getElementById('feedback');
  el.textContent = ''; el.className = 'feedback';
}

// ─── END GAME ─────────────────────────────────────────────────────────────────
function endGame() {
  clearInterval(timerInterval);
  document.getElementById('panel-game').classList.add('hidden');
  document.getElementById('panel-end').classList.remove('hidden');
  document.getElementById('final-score').textContent = totalScore;
  var tl  = t('taglines');
  var idx = totalScore < 100 ? 0 : totalScore < 300 ? 1 : totalScore < 600 ? 2 : totalScore < 1000 ? 3 : 4;
  document.getElementById('end-tagline').textContent = tl[idx];
  document.getElementById('seed-display').innerHTML =
    '<strong>' + t('seedShare') + '</strong><span id="seed-value">' + currentSeed + '</span>';
}

function copySeed() {
  navigator.clipboard.writeText(currentSeed).then(function() {
    var btn = document.querySelector('[onclick="copySeed()"]');
    var orig = btn.textContent;
    btn.textContent = '✓ OK!';
    setTimeout(function() { btn.textContent = orig; }, 2000);
  });
}

function getCountryDesc(c) {
  // Try by country_code first, then by matching known names
  var code = (c.country_code || '').toUpperCase();
  if (code && COUNTRY_DESCRIPTIONS[code]) {
    var d = COUNTRY_DESCRIPTIONS[code];
    return d[currentLang] || d.fr;
  }
  // Fallback: try matching by country_FR
  var nameFR = (c.country_FR || '').toLowerCase();
  var nameLookup = {
    'france':'FR','états-unis':'US','etats-unis':'US','brésil':'BR','bresil':'BR',
    'japon':'JP','inde':'IN','norvège':'NO','norvege':'NO','nigeria':'NG',
    'argentine':'AR','australie':'AU','chine':'CN','allemagne':'DE','russie':'RU',
    'royaume-uni':'GB','espagne':'ES','italie':'IT','canada':'CA','mexique':'MX'
  };
  var mapped = nameLookup[nameFR];
  if (mapped && COUNTRY_DESCRIPTIONS[mapped]) {
    var d2 = COUNTRY_DESCRIPTIONS[mapped];
    return d2[currentLang] || d2.fr;
  }
  return null;
}


// ─── COUNTRY TOOLTIP ──────────────────────────────────────────────────────────
var countryTooltipVisible = false;

function toggleCountryTooltip(e) {
  e.stopPropagation();
  var tip = document.getElementById('country-tooltip');
  if (countryTooltipVisible) {
    hideCountryTooltip();
    return;
  }
  var btn = document.getElementById('country-info-btn');
  tip.textContent = btn.dataset.desc || '';
  var tipWidth = 260;
  var rect = btn.getBoundingClientRect();
  var left = Math.max(8, Math.min(rect.left + rect.width/2 - tipWidth/2, window.innerWidth - tipWidth - 8));
  tip.style.width = tipWidth + 'px';
  tip.style.left  = left + 'px';
  tip.style.visibility = 'hidden';
  tip.classList.add('visible');
  var tipH = tip.offsetHeight;
  tip.classList.remove('visible');
  tip.style.visibility = '';
  tip.style.top = (rect.top - 8 - tipH < 8) ? (rect.bottom + 8) + 'px' : (rect.top - 8 - tipH) + 'px';
  tip.classList.add('visible');
  countryTooltipVisible = true;
}

function hideCountryTooltip() {
  document.getElementById('country-tooltip').classList.remove('visible');
  countryTooltipVisible = false;
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#country-info-btn') && !e.target.closest('#country-tooltip')) {
    hideCountryTooltip();
  }
});

function applyEmoji(el) {
  if (typeof twemoji !== 'undefined') {
    twemoji.parse(el, {
      folder: 'svg',
      ext: '.svg',
      base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
    });
  }
}
