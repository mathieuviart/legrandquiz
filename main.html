<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeGrandGeoQuiz - Version Data-Driven</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #ecf0f1; padding: 20px; }
        #game-container { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .category-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; cursor: pointer; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-weight: 600; }
        .category-btn:hover:not(:disabled) { border-color: var(--accent); background: #f7fbff; }
        .category-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #current-country { font-size: 2.2em; font-weight: 800; color: var(--accent); margin: 15px 0; }
        .hidden { display: none; }
        #loader { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>LeGrandGeoQuiz</h1>
    
    <div id="loader">Chargement des données géographiques...</div>

    <div id="setup" class="hidden">
        <p class="instructions">Objectif : Obtenir le score le plus <b>FAIBLE</b> possible.</p>
        <button id="start-btn" onclick="startGame()" style="padding: 15px 40px; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer;">Lancer la partie</button>
    </div>

    <div id="game-interface" class="hidden">
        <div id="feedback" style="height: 20px; font-weight: bold; color: #27ae60;"></div>
        <p>Pays actuel :</p>
        <div id="current-country">---</div>
        <div id="categories-list"></div>
        <div id="score-display" style="margin-top:20px; font-size: 1.2em;">Score Total : <span id="total-score">0</span></div>
        <p>Tour : <span id="turn-count">0</span> / 8</p>
    </div>

    <div id="end-screen" class="hidden">
        <h2>Partie terminée !</h2>
        <div id="final-score" style="font-size: 3em; font-weight: bold; color: var(--accent);">0</div>
        <button onclick="location.reload()">Rejouer</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    // Les catégories sont fixes, les pays viennent du JSON
    const categories = [
        { id: "fifa", name: "Classement FIFA Football" },
        { id: "chin", name: "Communauté Chinoise" },
        { id: "alpha", name: "Ordre Alphabétique" },
        { id: "obes", name: "Taux d'Obésité" },
        { id: "pib", name: "PIB par Habitant" },
        { id: "pop", name: "Nombre d'Habitants" },
        { id: "foot", name: "Nombre de Licenciés Foot" },
        { id: "tourist", name: "Arrivées Touristiques" }
    ];

    let countriesDatabase = []; // Sera rempli par le fetch
    let gameCountries = [];
    let currentStep = 0;
    let totalScore = 0;

    // --- CHARGEMENT DES DONNÉES ---
    async function initApp() {
        try {
            const response = await fetch('./country.json'); // Appel au fichier à la racine
            if (!response.ok) throw new Error("Erreur lors du chargement du fichier JSON");
            
            const data = await response.json();
            countriesDatabase = data.countries;

            // Une fois chargé, on affiche le bouton "Lancer"
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
        } catch (error) {
            document.getElementById('loader').innerText = "Erreur : Impossible de charger les pays.";
            console.error(error);
        }
    }

    // --- LOGIQUE DU JEU ---
    function startGame() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game-interface').classList.remove('hidden');
        
        // Mélange et sélection de 8 pays
        gameCountries = [...countriesDatabase]
            .sort(() => Math.random() - 0.5)
            .slice(0, 8);
        
        renderCategories();
        updateDisplay();
    }

    function renderCategories() {
        const container = document.getElementById('categories-list');
        container.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'category-btn';
            btn.id = `btn-${cat.id}`;
            btn.innerText = cat.name;
            btn.onclick = () => handleChoice(cat.id);
            container.appendChild(btn);
        });
    }

    function updateDisplay() {
        if (currentStep < gameCountries.length) {
            const country = gameCountries[currentStep];
            // Utilisation de l'emoji et du nom venant du JSON
            document.getElementById('current-country').innerHTML = `${country.emoji} ${country.name}`;
            document.getElementById('turn-count').innerText = currentStep + 1;
        } else {
            endGame();
        }
    }

    function handleChoice(categoryId) {
        const country = gameCountries[currentStep];
        
        // Simulation du score (à lier avec stats_rankings.json plus tard)
        // Pour l'instant on utilise une valeur aléatoire ou une propriété si elle existe
        const points = country[categoryId] || Math.floor(Math.random() * 100) + 1;

        totalScore += points;
        document.getElementById('total-score').innerText = totalScore;
        document.getElementById('feedback').innerText = `+${points} points (${country.name})`;
        
        document.getElementById(`btn-${categoryId}`).disabled = true;

        currentStep++;
        updateDisplay();
    }

    function endGame() {
        document.getElementById('game-interface').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = totalScore;
    }

    // Lancement au chargement de la page
    initApp();

</script>
</body>
</html>
